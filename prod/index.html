<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smeetz PROD Widget - Debug Mode</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 800px;
      width: 100%;
    }
    .status {
      margin: 20px 0;
      padding: 10px;
      border-radius: 5px;
      font-weight: bold;
    }
    .loading { background: #fff3cd; }
    .ready { background: #d4edda; }
    .iframe-loaded { background: #cfe2ff; }
    .error { background: #f8d7da; }

    .debug-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      width: 320px;
      max-height: 80vh;
      overflow-y: auto;
      border: 2px solid #000;
    }

    .debug-info {
      font-family: monospace;
      font-size: 12px;
      background: #f8f9fa;
      padding: 8px;
      border-radius: 5px;
      margin: 8px 0;
    }

    button {
      padding: 12px 20px;
      background: #121212;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 Smeetz PROD Widget (Debug Mode)</h1>

  <div id="status" class="status loading">
    Loading PROD Widget...
  </div>

  <br>

  <button onclick="openWidget()">Open Widget</button>
</div>

<div class="debug-panel">
  <h3>🐛 Debug Console</h3>
  <div id="debug-status" class="debug-info">Waiting...</div>
  <button onclick="checkWidget()">Check Widget</button>
  <button onclick="checkIframe()">Check Iframe</button>
  <div id="debug-log"></div>
</div>

<!-- PROD Widget Script -->
<script>
!function(e, t, n, i, p, r, s) {
  e[n] || ((p = e[n] = function() {
    p.p ? p.p.apply(p, arguments) : p.q.push(arguments);
  }).q = [], 
  p.t = 1 * new Date(), 
  p.g = "1", 
  (r = t.createElement("script")).async = 1,
  r.src = "https://tracker.smeetz.com/smeetz-main-widget.js",
  (s = t.getElementsByTagName("script")[0]).parentNode.insertBefore(r, s));
}(window, document, "_smtz");
</script>

<script>
const statusEl = document.getElementById("status");

function log(message, type = "info") {
  const div = document.createElement("div");
  div.className = "debug-info";
  div.style.borderLeft = "4px solid " + 
    (type === "error" ? "#dc3545" : 
     type === "success" ? "#28a745" : "#000");
  div.innerHTML = "<strong>" + new Date().toLocaleTimeString() + "</strong><br>" + message;
  document.getElementById("debug-log").appendChild(div);
}

function checkWidget() {
  const exists = typeof window._smtz !== "undefined";
  const loaded = window._smtz && window._smtz.p ? true : false;

  document.getElementById("debug-status").textContent =
    JSON.stringify({ exists, loaded }, null, 2);

  log("Checked widget object", "info");
}

function checkIframe() {
  const iframe = document.querySelector("iframe.smtz-lightbox-iframe");
  if (!iframe) {
    log("Iframe not found", "error");
  } else {
    log("Iframe found: " + iframe.src, "success");
  }
}

function observeIframe() {
  const observer = new MutationObserver((mutations) => {
    mutations.forEach((mutation) => {
      mutation.addedNodes.forEach((node) => {
        if (node.tagName === "IFRAME" &&
            node.classList.contains("smtz-lightbox-iframe")) {
          statusEl.textContent = "✅ Iframe Loaded";
          statusEl.className = "status iframe-loaded";
          log("Iframe injected into DOM", "success");
        }
      });
    });
  });
  observer.observe(document.body, { childList: true, subtree: true });
}

function checkWidgetLoaded() {
  if (window._smtz && window._smtz.p) {
    statusEl.textContent = "✅ PROD Widget Ready";
    statusEl.className = "status ready";
    log("Widget script loaded successfully", "success");
    observeIframe();
  } else {
    setTimeout(checkWidgetLoaded, 500);
  }
}

function openWidget() {
  if (!window._smtz) {
    log("Widget not ready yet", "error");
    return;
  }

  log("Opening widget...", "info");

  _smtz('openwidget', 1 * new Date(), {
    productId: '67400',
    lightbox: true,
    listView: false,
    gId: '1',
    wId: '2989',
    codes: 'NUV6ASPD',
    cats: '112131',
    cart: '1'
  });
}

setTimeout(checkWidgetLoaded, 1000);
</script>

</body>
</html>
